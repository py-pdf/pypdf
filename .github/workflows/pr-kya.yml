name: PR KYA summary

on:
  pull_request:
    types: [opened, synchronize, reopened]


permissions:
  pull-requests: write
  contents: read

jobs:
  kya-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate KYA comment body
        run: python scripts/pr_kya_comment.py --base-ref "${{ github.base_ref }}" > kya.md

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- nb-kya-autogen -->";
            const body = fs.readFileSync("kya.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });
            const existing = comments.data.find((comment) =>
              comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
